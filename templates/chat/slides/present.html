{% extends 'base.html' %}
{% block title %}{{ deck.title }} - Presentation - Nova AI{% endblock %}

{% block content %}
<div id="presentation" class="fixed inset-0 bg-black overflow-hidden">
    <!-- Slide Container -->
    <div id="slide-container" class="w-full h-full flex items-center justify-center">
        <div id="current-slide" class="relative transition-all duration-500">
            <!-- Slide content rendered here -->
        </div>
    </div>
    
    <!-- Controls -->
    <div id="controls" class="fixed bottom-0 left-0 right-0 h-14 bg-gradient-to-t from-black/80 to-transparent flex items-center justify-between px-6 opacity-0 hover:opacity-100 transition-opacity duration-300">
        <div class="flex items-center gap-4 text-white/70">
            <span id="slide-counter" class="text-sm font-medium">1 / {{ slides|length }}</span>
            <span class="text-white/30">|</span>
            <span class="text-sm truncate max-w-md">{{ deck.title }}</span>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="previousSlide()" class="p-2 hover:bg-white/10 rounded-full text-white/70 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
            </button>
            <button onclick="togglePlayPause()" id="play-btn" class="p-2 hover:bg-white/10 rounded-full text-white/70 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </button>
            <button onclick="nextSlide()" class="p-2 hover:bg-white/10 rounded-full text-white/70 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="toggleFullscreen()" class="p-2 hover:bg-white/10 rounded-full text-white/70 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"/>
                </svg>
            </button>
            <a href="{% url 'slide_editor' deck.id %}" class="p-2 hover:bg-white/10 rounded-full text-white/70 hover:text-white transition-colors" title="Edit">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
            </a>
            <button onclick="exitPresentation()" class="p-2 hover:bg-white/10 rounded-full text-white/70 hover:text-white transition-colors" title="Exit">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Progress Bar -->
    <div class="fixed bottom-0 left-0 right-0 h-1 bg-white/10">
        <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-300" style="width: 0%"></div>
    </div>
    
    <!-- Arrow Hints -->
    <button onclick="previousSlide()" class="fixed left-4 top-1/2 -translate-y-1/2 p-3 text-white/20 hover:text-white/60 transition-colors opacity-0 hover:opacity-100">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
    </button>
    <button onclick="nextSlide()" class="fixed right-4 top-1/2 -translate-y-1/2 p-3 text-white/20 hover:text-white/60 transition-colors opacity-0 hover:opacity-100">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
    </button>
</div>

<script>
// Data
const slides = {{ slides|safe }};
const theme = {{ theme_config|safe }};
const deckId = {{ deck.id }};

// State
let currentIndex = 0;
let autoPlayInterval = null;
let isPlaying = false;

// Elements
const slideContainer = document.getElementById('current-slide');
const slideCounter = document.getElementById('slide-counter');
const progressBar = document.getElementById('progress-bar');
const playBtn = document.getElementById('play-btn');

// Initialize
function init() {
    renderSlide();
    updateProgress();
    
    // Auto fullscreen on load
    if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
    }
    
    // Keyboard controls
    document.addEventListener('keydown', handleKeydown);
    
    // Touch/swipe support
    let touchStartX = 0;
    let touchEndX = 0;
    
    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
    });
    
    document.addEventListener('touchend', e => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
    });
    
    function handleSwipe() {
        const diff = touchStartX - touchEndX;
        if (Math.abs(diff) > 50) {
            if (diff > 0) nextSlide();
            else previousSlide();
        }
    }
}

function renderSlide() {
    const slide = slides[currentIndex];
    const html = renderSlideHTML(slide, theme);
    
    // Calculate dimensions
    const ratio = '{{ deck.aspect_ratio }}';
    let width, height;
    
    if (ratio === '16:9') {
        width = Math.min(window.innerWidth, window.innerHeight * 16/9);
        height = width * 9/16;
    } else if (ratio === '4:3') {
        width = Math.min(window.innerWidth, window.innerHeight * 4/3);
        height = width * 3/4;
    } else {
        width = Math.min(window.innerWidth, window.innerHeight * 21/9);
        height = width * 9/21;
    }
    
    slideContainer.style.width = width + 'px';
    slideContainer.style.height = height + 'px';
    slideContainer.innerHTML = html;
    
    slideCounter.textContent = `${currentIndex + 1} / ${slides.length}`;
}

function renderSlideHTML(slide, theme) {
    const content = slide.content || {};
    const layout = slide.layout;
    
    const bgStyle = `background: ${theme.bg}; color: ${theme.text};`;
    
    // Get canvas elements HTML
    const canvasHtml = renderCanvasElementsForPresent(slide, theme);
    
    switch(layout) {
        case 'title':
            return `
                <div class="h-full flex flex-col items-center justify-center text-center p-16 rounded-lg relative" style="${bgStyle}">
                    <h1 class="text-6xl font-bold mb-6">${escapeHtml(content.title || 'Untitled')}</h1>
                    ${content.subtitle ? `<p class="text-3xl opacity-80 mb-4">${escapeHtml(content.subtitle)}</p>` : ''}
                    ${content.author ? `<p class="mt-12 text-xl opacity-60">${escapeHtml(content.author)}</p>` : ''}
                    ${canvasHtml}
                </div>
            `;
        
        case 'content':
            const bullets = (content.bullets || []).map(b => 
                `<li class="mb-4 text-2xl flex items-start gap-4"><span class="w-3 h-3 rounded-full mt-2.5 flex-shrink-0" style="background: ${theme.accent};"></span><span>${escapeHtml(b)}</span></li>`
            ).join('');
            return `
                <div class="h-full flex flex-col p-16 rounded-lg relative" style="${bgStyle}">
                    ${content.title ? `<h2 class="text-4xl font-bold mb-8">${escapeHtml(content.title)}</h2>` : ''}
                    ${content.content ? `<p class="text-xl mb-6 leading-relaxed">${escapeHtml(content.content)}</p>` : ''}
                    ${bullets ? `<ul class="list-none">${bullets}</ul>` : ''}
                    ${canvasHtml}
                </div>
            `;
        
        case 'two-column':
            const leftBullets = (content.left_bullets || []).map(b => 
                `<li class="mb-3 text-xl flex items-start gap-3"><span class="w-2 h-2 rounded-full mt-2.5 flex-shrink-0" style="background: ${theme.accent};"></span>${escapeHtml(b)}</li>`
            ).join('');
            const rightBullets = (content.right_bullets || []).map(b => 
                `<li class="mb-3 text-xl flex items-start gap-3"><span class="w-2 h-2 rounded-full mt-2.5 flex-shrink-0" style="background: ${theme.accent};"></span>${escapeHtml(b)}</li>`
            ).join('');
            return `
                <div class="h-full flex flex-col p-16 rounded-lg relative" style="${bgStyle}">
                    ${content.title ? `<h2 class="text-4xl font-bold mb-8">${escapeHtml(content.title)}</h2>` : ''}
                    <div class="flex-1 grid grid-cols-2 gap-12">
                        <div>${leftBullets ? `<ul class="list-none">${leftBullets}</ul>` : ''}</div>
                        <div>${rightBullets ? `<ul class="list-none">${rightBullets}</ul>` : ''}</div>
                    </div>
                    ${canvasHtml}
                </div>
            `;
        
        case 'quote':
            const quote = content.quote || {};
            return `
                <div class="h-full flex flex-col items-center justify-center text-center p-20 rounded-lg relative" style="${bgStyle}">
                    <p class="text-5xl font-light italic leading-relaxed mb-8">"${escapeHtml(quote.text || content.content || '')}"</p>
                    ${quote.author || content.author ? `<p class="text-2xl opacity-60">— ${escapeHtml(quote.author || content.author)}</p>` : ''}
                    ${canvasHtml}
                </div>
            `;
        
        case 'section':
            return `
                <div class="h-full flex flex-col items-center justify-center text-center p-16 rounded-lg relative" style="${bgStyle}">
                    ${content.section_number ? `<span class="text-9xl font-bold opacity-20 mb-6" style="color: ${theme.accent};">${content.section_number}</span>` : ''}
                    <h1 class="text-5xl font-bold mb-4">${escapeHtml(content.title || '')}</h1>
                    ${content.subtitle ? `<p class="text-2xl opacity-70">${escapeHtml(content.subtitle)}</p>` : ''}
                    <div class="mt-12 w-32 h-1 rounded-full" style="background: ${theme.accent};"></div>
                    ${canvasHtml}
                </div>
            `;
        
        case 'image-text':
        case 'text-image':
            const imgUrl = content.image?.url || '';
            const imgHtml = imgUrl ? `<img src="${escapeHtml(imgUrl)}" class="max-w-full max-h-[400px] object-contain rounded-lg shadow-2xl">` : '';
            const contentHtml = `
                ${content.title ? `<h2 class="text-3xl font-bold mb-4">${escapeHtml(content.title)}</h2>` : ''}
                ${content.content ? `<p class="text-lg">${escapeHtml(content.content)}</p>` : ''}
                ${content.bullets ? `<ul class="list-none mt-4">${content.bullets.map(b => `<li class="mb-2">• ${escapeHtml(b)}</li>`).join('')}</ul>` : ''}
            `;
            
            const leftContent = layout === 'image-text' ? imgHtml : contentHtml;
            const rightContent = layout === 'image-text' ? contentHtml : imgHtml;
            
            return `
                <div class="h-full flex flex-col p-16 rounded-lg relative" style="${bgStyle}">
                    <div class="flex-1 grid grid-cols-2 gap-12 items-center">
                        <div>${leftContent}</div>
                        <div>${rightContent}</div>
                    </div>
                    ${canvasHtml}
                </div>
            `;
        
        default:
            return `<div class="h-full flex items-center justify-center rounded-lg relative" style="${bgStyle}"><p class="opacity-50 text-2xl">${layout} layout</p>${canvasHtml}</div>`;
    }
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
}

function renderCanvasElementsForPresent(slide, theme) {
    const content = slide.content || {};
    const canvasElements = content._canvasElements || content.canvasElements || [];
    
    if (!canvasElements || canvasElements.length === 0) {
        return '';
    }
    
    let html = '';
    canvasElements.forEach(el => {
        if (!el || !el.type) return;
        
        const posX = el.position?.x || 50;
        const posY = el.position?.y || 50;
        const style = `position: absolute; left: ${posX}%; top: ${posY}%; transform: translate(-50%, -50%);`;
        
        if (el.type === 'image') {
            const width = el.size?.width || '40%';
            html += `<div style="${style} max-width: ${width}; z-index: 10;">
                <img src="${escapeHtml(el.src || '')}" alt="${escapeHtml(el.alt || '')}" 
                    style="max-width: 100%; max-height: 100%; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            </div>`;
        } else if (el.type === 'shape') {
            const size = '80px';
            const fill = el.fill || '#3b82f6';
            const stroke = el.stroke !== 'transparent' ? el.stroke : 'none';
            const strokeWidth = el.strokeWidth || 2;
            
            let shapeSvg = '';
            switch(el.shape) {
                case 'rectangle':
                    shapeSvg = `<rect x="10" y="20" width="60" height="40" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}" rx="4"/>`;
                    break;
                case 'circle':
                    shapeSvg = `<circle cx="40" cy="40" r="30" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
                    break;
                case 'triangle':
                    shapeSvg = `<polygon points="40,10 70,60 10,60" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
                    break;
                case 'diamond':
                    shapeSvg = `<polygon points="40,10 70,40 40,70 10,40" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
                    break;
                case 'star':
                    shapeSvg = `<polygon points="40,10 48,35 75,35 52,50 60,75 40,60 20,75 28,50 5,35 32,35" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
                    break;
                case 'arrow':
                    shapeSvg = `<path d="M10,35 L50,35 L50,20 L70,40 L50,60 L50,45 L10,45 Z" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
                    break;
                case 'heart':
                    shapeSvg = `<path d="M40,70 C40,70 10,50 10,30 C10,15 20,10 30,10 C35,10 40,15 40,20 C40,15 45,10 50,10 C60,10 70,15 70,30 C70,50 40,70 40,70 Z" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
                    break;
                case 'hexagon':
                    shapeSvg = `<polygon points="40,10 65,25 65,55 40,70 15,55 15,25" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>`;
                    break;
                default:
                    shapeSvg = `<rect x="10" y="20" width="60" height="40" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}" rx="4"/>`;
            }
            
            html += `<div style="${style} width: ${size}; height: ${size}; z-index: 10;">
                <svg width="100%" height="100%" viewBox="0 0 80 80">${shapeSvg}</svg>
            </div>`;
        } else if (el.type === 'icon') {
            const color = el.color || '#3b82f6';
            const iconPaths = {
                'chart': 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z',
                'users': 'M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z',
                'lightbulb': 'M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z',
                'target': 'M13 10V3L4 14h7v7l9-11h-7z',
                'rocket': 'M15.59 14.37a6 6 0 01-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 006.16-12.12A14.98 14.98 0 009.631 8.41m5.96 5.96a14.926 14.926 0 01-5.841 2.58m-.119-8.54a6 6 0 00-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 00-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 01-2.448-2.448 14.9 14.9 0 01.06-.312m-2.24 2.39a4.87 4.87 0 00-1.023 1.051c-1.205 1.636-1.527 3.875-.966 5.873a1.766 1.766 0 01-1.485 2.053 1.76 1.76 0 01-1.485-.568 1.766 1.766 0 01-.644-1.59c.183-.76.472-1.49.863-2.181a11.9 11.9 0 012.928-3.362 5.65 5.65 0 00.958-1.303c.168-.292.405-.55.705-.741a3.06 3.06 0 011.73-.535c.7 0 1.39.18 2 .52',
                'code': 'M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4',
                'database': 'M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4',
                'cloud': 'M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z',
                'shield': 'M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z',
                'wifi': 'M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01m-7.08-7.071c3.904-3.905 10.236-3.905 14.141 0M1.394 9.393c5.857-5.857 15.355-5.857 21.213 0',
                'menu': 'M4 6h16M4 12h16M4 18h16',
                'search': 'M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z',
                'settings': 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z',
                'bell': 'M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9',
                'calendar': 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z'
            };
            const path = iconPaths[el.icon] || iconPaths['chart'];
            html += `<div style="${style} z-index: 10; color: ${color};">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="${path}"/>
                </svg>
            </div>`;
        }
    });
    
    return html;
}

function handleKeydown(e) {
    switch(e.key) {
        case 'ArrowRight':
        case 'ArrowDown':
        case ' ':
            e.preventDefault();
            nextSlide();
            break;
        case 'ArrowLeft':
        case 'ArrowUp':
            e.preventDefault();
            previousSlide();
            break;
        case 'Home':
            e.preventDefault();
            goToSlide(0);
            break;
        case 'End':
            e.preventDefault();
            goToSlide(slides.length - 1);
            break;
        case 'Escape':
            exitPresentation();
            break;
        case 'f':
        case 'F11':
            e.preventDefault();
            toggleFullscreen();
            break;
    }
}

function nextSlide() {
    if (currentIndex < slides.length - 1) {
        currentIndex++;
        renderSlide();
        updateProgress();
    }
}

function previousSlide() {
    if (currentIndex > 0) {
        currentIndex--;
        renderSlide();
        updateProgress();
    }
}

function goToSlide(index) {
    if (index >= 0 && index < slides.length) {
        currentIndex = index;
        renderSlide();
        updateProgress();
    }
}

function updateProgress() {
    const progress = ((currentIndex + 1) / slides.length) * 100;
    progressBar.style.width = progress + '%';
}

function togglePlayPause() {
    isPlaying = !isPlaying;
    
    if (isPlaying) {
        playBtn.innerHTML = `
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        `;
        autoPlayInterval = setInterval(() => {
            if (currentIndex < slides.length - 1) {
                nextSlide();
            } else {
                togglePlayPause();
            }
        }, 5000);
    } else {
        playBtn.innerHTML = `
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        `;
        clearInterval(autoPlayInterval);
    }
}

function toggleFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
    } else {
        document.exitFullscreen().catch(() => {});
    }
}

function exitPresentation() {
    if (document.fullscreenElement) {
        document.exitFullscreen().catch(() => {});
    }
    window.location.href = `/slides/editor/${deckId}/`;
}

// Handle window resize
window.addEventListener('resize', () => {
    renderSlide();
});

// Initialize
init();
</script>
